<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校内案内マップ - フロアナビ</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f8fafc;
    }

    /* 認証画面 */
    #pass-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #0f172a;
      display: flex; justify-content: center; align-items: center;
      z-index: 9999;
    }

    .pass-card {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      width: 320px;
    }

    .pass-card h2 { margin-bottom: 20px; color: #0f172a; font-size: 20px; }
    .pass-card input[type="password"] {
      width: 100%; padding: 10px; margin-bottom: 15px;
      border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; outline: none;
    }

    .pass-card button {
      width: 100%; padding: 10px; background-color: #2563eb; color: white;
      border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;
    }

    .error-msg { color: #ef4444; font-size: 14px; margin-top: 10px; display: none; }

    /* メインアプリ */
    #app-screen { display: none; width: 100%; height: 100%; position: relative; }

    /* 階数切り替えタブ */
    .floor-tabs {
      position: absolute; top: 15px; right: 15px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      padding: 6px; border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      display: flex; gap: 4px; backdrop-filter: blur(5px);
    }

    .floor-tab {
      padding: 6px 12px; border: 1px solid #e2e8f0; border-radius: 6px;
      background: white; font-weight: bold; font-size: 13px; cursor: pointer; color: #475569;
    }

    .floor-tab.active {
      background: #2563eb; color: white; border-color: #2563eb;
    }

    /* サイドコントロールパネル */
    .control-panel {
      position: absolute; top: 15px; left: 15px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      padding: 15px 20px; border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      display: flex; flex-direction: column; gap: 10px;
      width: 320px; max-height: calc(100vh - 30px); overflow-y: auto;
      backdrop-filter: blur(5px);
    }

    .select-group { display: flex; flex-direction: column; gap: 4px; }
    .select-group label { font-size: 12px; font-weight: bold; color: #475569; }
    .select-group select {
      padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
      font-size: 14px; outline: none; background-color: #fff;
    }

    .btn-search {
      padding: 10px; background-color: #059669; color: white;
      border: none; border-radius: 6px; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: background-color 0.2s;
    }

    .btn-search:hover { background-color: #047857; }

    /* ステップ表示UI */
    #step-guide {
      margin-top: 10px; display: flex; flex-direction: column; gap: 8px;
    }

    .step-card {
      background: #f1f5f9; border-left: 4px solid #2563eb;
      padding: 10px; border-radius: 4px; font-size: 13px;
    }

    .step-card strong { color: #0f172a; display: block; margin-bottom: 2px; }
    .step-btn {
      margin-top: 6px; padding: 4px 8px; background: #2563eb; color: white;
      border: none; border-radius: 4px; font-size: 11px; cursor: pointer;
    }

    /* マップエリア */
    #map { width: 100%; height: 100%; background-color: #e2e8f0; }

    .animated-pulse-icon {
      width: 16px; height: 16px; background-color: #2563eb;
      border: 2px solid white; border-radius: 50%;
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.8);
      animation: pulse-animation 1.2s infinite ease-in-out;
    }

    @keyframes pulse-animation {
      0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
      70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
      100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
    }
  </style>
</head>
<body>

  <!-- 認証画面 -->
  <div id="pass-screen">
    <div class="pass-card">
      <h2>校内案内マップ</h2>
      <input type="password" id="passInput" placeholder="パスワードを入力">
      <button onclick="checkPassword()">ログイン</button>
      <div id="errorMsg" class="error-msg">パスワードが違います</div>
    </div>
  </div>

  <!-- メインアプリ画面 -->
  <div id="app-screen">
    <!-- フロアタブUI -->
    <div class="floor-tabs" id="floorTabs">
      <button class="floor-tab active" onclick="switchFloor(1)">1F</button>
      <button class="floor-tab" onclick="switchFloor(2)">2F</button>
      <button class="floor-tab" onclick="switchFloor(3)">3F</button>
      <button class="floor-tab" onclick="switchFloor(4)">4F</button>
      <button class="floor-tab" onclick="switchFloor(5)">5F</button>
      <button class="floor-tab" onclick="switchFloor(6)">6F</button>
      <button class="floor-tab" onclick="switchFloor(7)">7F</button>
      <button class="floor-tab" onclick="switchFloor(8)">8F</button>
    </div>

    <!-- コントロールパネル -->
    <div class="control-panel">
      <div class="select-group">
        <label for="startSelect">🚩 出発地</label>
        <select id="startSelect"></select>
      </div>
      <div class="select-group">
        <label for="endSelect">🎯 目的地</label>
        <select id="endSelect"></select>
      </div>
      <button class="btn-search" onclick="calculateRoute()">ルート案内を開始</button>
      
      <!-- ナビゲーション案内カード表示エリア -->
      <div id="step-guide"></div>
    </div>
    
    <div id="map"></div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const CORRECT_PASSWORD = "meijo2026";
    let map = null;
    let currentFloor = 1;

    let activeLines = [];
    let activeMarkers = [];

    // 階数ごとのズーム表示用データ (画像のY座標でフロア範囲を特定)
    const floorViewBounds = {
      1: [[-700, 200], [-500, 400]],
      2: [[-550, 200], [-380, 400]],
      3: [[-400, 200], [-230, 400]],
      4: [[-250, 200], [-80, 400]],
      5: [[-700, 100], [-520, 220]],
      6: [[-520, 100], [-350, 220]],
      7: [[-380, 100], [-220, 220]],
      8: [[-230, 100], [-80, 220]]
    };

    // スポットデータ（階数情報 floor を追加）
    const spots = {
      "1g_1f_3s4": { name: "1号館 1F 3S4", floor: 1, pos: [-657, 228] },
      "1g_1f_保健室": { name: "1号館 1F 保健室", floor: 1, pos: [-634, 278] },
      "1g_1f_事務室": { name: "1号館 1F 事務室", floor: 1, pos: [-561, 351] },
      "1g_2f_2a1": { name: "1号館 2F 2A1", floor: 2, pos: [-425, 228] },
      "1g_2f_3a1": { name: "1号館 2F 3A1", floor: 2, pos: [-422, 272] },
      "1g_3f_3a2": { name: "1号館 3F 3A2", floor: 3, pos: [-271, 225] },
      "1g_3f_生物室": { name: "1号館 3F 生物室", floor: 3, pos: [-280, 359] },
      "1g_4f_2a2": { name: "1号館 4F 2A2", floor: 4, pos: [-133, 226] },
      "1g_4f_2a8": { name: "1号館 4F 2A8", floor: 4, pos: [-206, 274] },
      "1g_7f_職員室": { name: "1号館 7F 職員室", floor: 7, pos: [-296, 140] },
      "1g_8f_ict2": { name: "1号館 8F ICT2", floor: 8, pos: [-145, 126] }
    };

    // 階ごとのハブ（階段・エレベーターの場所）
    const floorStairs = {
      1: { name: "1F 階段", pos: [-570, 278] },
      2: { name: "2F 階段", pos: [-450, 278] },
      3: { name: "3F 階段", pos: [-320, 278] },
      4: { name: "4F 階段", pos: [-180, 278] },
      5: { name: "5F 階段", pos: [-600, 155] },
      6: { name: "6F 階段", pos: [-450, 155] },
      7: { name: "7F 階段", pos: [-320, 155] },
      8: { name: "8F 階段", pos: [-180, 155] }
    };

    function checkPassword() {
      const input = document.getElementById('passInput').value;
      if (input === CORRECT_PASSWORD) {
        document.getElementById('pass-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        initMap();
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    function initMap() {
      const bounds = [[-700, 0], [0, 1000]];
      map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1,
        maxZoom: 2,
        zoomControl: false
      });

      L.imageOverlay('R8教室配置図-1.png', bounds).addTo(map);

      // プルダウンの作成
      const startSelect = document.getElementById('startSelect');
      const endSelect = document.getElementById('endSelect');

      Object.keys(spots).forEach(key => {
        const spot = spots[key];
        startSelect.add(new Option(spot.name, key));
        endSelect.add(new Option(spot.name, key));
      });

      startSelect.value = "1g_1f_3s4";
      endSelect.value = "1g_4f_2a2";

      switchFloor(1);
    }

    // タブ切り替え処理
    function switchFloor(floorNum) {
      currentFloor = floorNum;

      // タブのUI更新
      document.querySelectorAll('.floor-tab').forEach((tab, index) => {
        if (index + 1 === floorNum) {
          tab.classList.add('active');
        } else {
          tab.classList.remove('active');
        }
      });

      // マップを指定階にフォーカス
      if (map && floorViewBounds[floorNum]) {
        map.fitBounds(floorViewBounds[floorNum], { padding: [20, 20] });
      }
    }

    // 階層ナビ計算
    function calculateRoute() {
      const startKey = document.getElementById('startSelect').value;
      const endKey = document.getElementById('endSelect').value;

      if (startKey === endKey) {
        alert("出発地と目的地を変えてください。");
        return;
      }

      // クリア
      activeLines.forEach(l => map.removeLayer(l));
      activeMarkers.forEach(m => map.removeLayer(m));
      activeLines = [];
      activeMarkers = [];

      const start = spots[startKey];
      const end = spots[endKey];
      const guideContainer = document.getElementById('step-guide');
      guideContainer.innerHTML = "";

      // パターンA: 同一階の場合
      if (start.floor === end.floor) {
        switchFloor(start.floor);
        
        const line = L.polyline([start.pos, end.pos], { color: '#2563eb', weight: 5 }).addTo(map);
        const m1 = L.marker(start.pos).addTo(map).bindPopup(`<b>出発: ${start.name}</b>`).openPopup();
        const m2 = L.marker(end.pos).addTo(map).bindPopup(`<b>到着: ${end.name}</b>`);
        
        activeLines.push(line);
        activeMarkers.push(m1, m2);

        guideContainer.innerHTML = `
          <div class="step-card">
            <strong>📍 ${start.floor}F内での移動</strong>
            ${start.name} から ${end.name} へ直接移動します。
          </div>
        `;
      } 
      // パターンB: 別階への移動が発生する場合
      else {
        switchFloor(start.floor);

        const startStair = floorStairs[start.floor];
        const endStair = floorStairs[end.floor];

        // 1. 出発階の描画
        const lineStart = L.polyline([start.pos, startStair.pos], { color: '#2563eb', weight: 5, dashArray: '6,6' }).addTo(map);
        const mStart = L.marker(start.pos).addTo(map).bindPopup(`<b>出発: ${start.name}</b>`).openPopup();
        const mStair1 = L.marker(startStair.pos).addTo(map).bindPopup(`<b>階段へ移動</b>`);

        // 2. 到着階の描画
        const lineEnd = L.polyline([endStair.pos, end.pos], { color: '#059669', weight: 5 }).addTo(map);
        const mStair2 = L.marker(endStair.pos).addTo(map).bindPopup(`<b>${end.floor}F 階段到着</b>`);
        const mEnd = L.marker(end.pos).addTo(map).bindPopup(`<b>到着: ${end.name}</b>`);

        activeLines.push(lineStart, lineEnd);
        activeMarkers.push(mStart, mStair1, mStair2, mEnd);

        // ガイド表示
        guideContainer.innerHTML = `
          <div class="step-card">
            <strong>Step 1: ${start.floor}F 階段へ向かう</strong>
            ${start.name} から ${start.floor}F 階段へ移動します。
            <br><button class="step-btn" onclick="switchFloor(${start.floor})">${start.floor}Fマップを表示</button>
          </div>
          <div class="step-card" style="border-left-color: #f59e0b;">
            <strong>Step 2: 階段・エレベーター移動</strong>
            ${start.floor}F から <strong>${end.floor}F</strong> へ昇り/降ります。
          </div>
          <div class="step-card" style="border-left-color: #059669;">
            <strong>Step 3: ${end.floor}F 目的地へ移動</strong>
            ${end.floor}F 階段から ${end.name} へ向かいます。
            <br><button class="step-btn" onclick="switchFloor(${end.floor})">${end.floor}Fマップを表示</button>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
