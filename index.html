      --glass-border: rgba(255, 255, 255, 0.4);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
    body { margin: 0; padding: 0; background: #f8fafc; color: #334155; overflow: hidden; }

    /* 🔑 パスワード認証画面 */
    #pass-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); padding: 40px 32px; border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); text-align: center;
      width: 90%; max-width: 380px; animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .login-card .logo-badge {
      display: inline-block; background: #eff6ff; color: var(--accent-color);
      font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 0.05em;
    }
    .login-card h2 { margin: 0 0 8px 0; color: var(--primary-color); font-size: 20px; font-weight: 700; line-height: 1.4; }
    .login-card p { font-size: 13px; color: #64748b; margin: 0 0 24px 0; line-height: 1.5; }
    .login-card input {
      width: 100%; padding: 12px 16px; font-size: 15px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; margin-bottom: 16px; text-align: center; outline: none; transition: all 0.2s;
    }
    .login-card input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
    .login-card button {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 600; color: white;
      background: var(--accent-color); border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.2s, transform 0.1s; box-shadow: var(--shadow-md);
    }
    .login-card button:hover { background: var(--accent-hover); }
    .login-card button:active { transform: scale(0.98); }
    .error-msg { color: #ef4444; font-size: 12px; margin-top: 12px; font-weight: 500; display: none; }

    /* 🗺️ メイン画面 */
    #app-screen { display: none; height: 100vh; width: 100vw; position: relative; }
    #map { height: 100vh; width: 100vw; background: #f1f5f9; z-index: 1; }

    /* Floating UI パネル */
    .control-panel {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 1000; width: 92%; max-width: 680px;
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 20px; padding: 16px 20px;
      box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 12px;
    }
    .select-group { display: flex; gap: 12px; width: 100%; }
    .select-box { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .select-box label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .select-wrapper { position: relative; }
    select {
      width: 100%; padding: 10px 14px; font-size: 14px; font-weight: 500;
      color: var(--primary-color); border: 1px solid #cbd5e1; border-radius: 10px;
      background-color: #ffffff; outline: none; cursor: pointer; appearance: none; transition: all 0.2s;
    }
    .select-wrapper::after {
      content: "▾"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 12px; color: #94a3b8; pointer-events: none;
    }
    select:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }

    .btn-nav {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 700; color: white;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-nav:hover { box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4); transform: translateY(-1px); }
    .btn-nav:active { transform: translateY(0); }

    /* アニメーション用パルス円アイコン */
    .animated-pulse-icon {
      background: #2563eb;
      border: 3px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.8);
    }

    @media (max-width: 640px) {
      .control-panel { bottom: 16px; padding: 14px; }
      .select-group { flex-direction: column; gap: 8px; }
    }
  </style>
</head>

    ["3g_2f_avl", "3g_stair"], ["3g_2f_学習ルーム", "3g_stair"], ["3g_3f_製図室", "3g_stair"],
    ["3g_4f_特別教室", "3g_stair"], ["3g_4f_作法室", "3g_stair"],

    // 3号館 ↔ 4号館 接続
    ["3g_stair", "bridge_3_4"],
    ["bridge_3_4", "4g_stair"],

    // 4号館内部 ↔ 階段
    ["4g_1f_機械システム系", "4g_stair"], ["4g_1f_原動機実習室", "4g_stair"], ["4g_1f_cam実習室", "4g_stair"],
    ["4g_2f_印刷室", "4g_stair"], ["4g_2f_機械システム管理室", "4g_stair"], ["4g_3f_cad1", "4g_stair"],
    ["4g_3f_cad2", "4g_stair"], ["4g_4f_パソコン3", "4g_stair"], ["4g_4f_パソコン4", "4g_stair"], ["4g_4f_商業管理室", "4g_stair"]
  ];

  // 🧮 2点間の直線距離計算（コスト計算）
  function getDistance(pos1, pos2) {
    const dy = pos1[0] - pos2[0];
    const dx = pos1[1] - pos2[1];
    return Math.sqrt(dy * dy + dx * dx);
  }

  // 🧠 ダイクストラ法による最短経路検索
  function findShortestPath(startKey, endKey) {
    const distances = {};
    const previous = {};
    const unvisited = new Set();

    Object.keys(allNodes).forEach(node => {
      distances[node] = Infinity;
      previous[node] = null;
      unvisited.add(node);
    });

    distances[startKey] = 0;

    while (unvisited.size > 0) {
      let current = null;
      let nearestDist = Infinity;

      unvisited.forEach(node => {
        if (distances[node] < nearestDist) {
          nearestDist = distances[node];
          current = node;
        }
      });

      if (current === null || current === endKey) break;

      unvisited.delete(current);

      // 隣接ノードの探索
      edges.forEach(([u, v]) => {
        let neighbor = null;
        if (u === current) neighbor = v;
        if (v === current) neighbor = u;

        if (neighbor && unvisited.has(neighbor)) {
          const alt = distances[current] + getDistance(allNodes[current].pos, allNodes[neighbor].pos);
          if (alt < distances[neighbor]) {
            distances[neighbor] = alt;
            previous[neighbor] = current;
          }
        }
      });
    }

    // 経路の復元
    const path = [];
    let curr = endKey;
    while (curr !== null) {
      path.unshift(curr);
      curr = previous[curr];
    }

    // 孤立等で繋がらなかった場合は直通ルートにフォールバック
    if (path[0] !== startKey) {
      return [startKey, endKey];
    }

    return path;
  }

  function initMap() {
    if (map) return;

    const bounds = [[-700, 0], [0, 1000]];

    map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -1.5,
      maxZoom: 2,
      maxBounds: bounds,
      zoomControl: false
    });

    L.imageOverlay('R8教室配置図-1.png', bounds).addTo(map);
    map.fitBounds(bounds);

    const startSelect = document.getElementById('startSelect');
    const endSelect = document.getElementById('endSelect');

    // プルダウン作成
    Object.keys(spots).forEach(key => {
      const spot = spots[key];

      const optStart = document.createElement('option');
      optStart.value = key; optStart.textContent = spot.name;
      startSelect.appendChild(optStart);

      const optEnd = document.createElement('option');
      optEnd.value = key; optEnd.textContent = spot.name;
      endSelect.appendChild(optEnd);
    });

    // 初期選択設定
    startSelect.value = "1g_1f_事務室";
    endSelect.value = "4g_4f_パソコン3";

    showRoute();
  }

  function showRoute() {
    const startKey = document.getElementById('startSelect').value;
    const endKey = document.getElementById('endSelect').value;

    if (startKey === endKey) {
      alert("出発地と目的地が異なる場所を選択してください");
      return;
    }

    // レイヤー・タイマー等のリセット
    if (activeLine) map.removeLayer(activeLine);
    if (startMarker) map.removeLayer(startMarker);
    if (endMarker) map.removeLayer(endMarker);
    if (animMarker) map.removeLayer(animMarker);
    if (animTimer) clearInterval(animTimer);

    const startSpot = spots[startKey];
    const endSpot = spots[endKey];

    // 最短経路上にあるノード列を取得
    const pathKeys = findShortestPath(startKey, endKey);
    const pathCoords = pathKeys.map(k => allNodes[k].pos);

    // ピン表示
    startMarker = L.marker(startSpot.pos).addTo(map).bindPopup(`<b>[出発地] ${startSpot.name}</b>`).openPopup();
    endMarker = L.marker(endSpot.pos).addTo(map).bindPopup(`<b>[目的地] ${endSpot.name}</b>`);

    // 経由地を含めた折り返しラインを表示
    activeLine = L.polyline(pathCoords, {
      color: '#2563eb',
      weight: 5,
      dashArray: '8, 8',
      opacity: 0.8
    }).addTo(map);

    // アニメーション用パルス点
    const pulseIcon = L.divIcon({
      className: 'animated-pulse-icon',
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    });

    animMarker = L.marker(pathCoords[0], { icon: pulseIcon }).addTo(map);

    // 🌀 複数セグメントを跨ぐアニメーション処理
    let pathIndex = 0;
    let step = 0;
    const stepsPerSegment = 30;

    animTimer = setInterval(() => {
      step++;
      if (step > stepsPerSegment) {
        step = 0;
        pathIndex++;
        if (pathIndex >= pathCoords.length - 1) {
          pathIndex = 0; // ループ再生
        }
      }

      const p1 = pathCoords[pathIndex];
      const p2 = pathCoords[pathIndex + 1];
      const progress = step / stepsPerSegment;

      const currentY = p1[0] + (p2[0] - p1[0]) * progress;
      const currentX = p1[1] + (p2[1] - p1[1]) * progress;

      animMarker.setLatLng([currentY, currentX]);
    }, 25);

    map.fitBounds(activeLine.getBounds(), { padding: [100, 100] });
  }
</script>
