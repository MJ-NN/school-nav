<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校内案内マップ</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f3f4f6;
    }

    /* パスワード入力画面 */
    #pass-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .pass-card {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      width: 320px;
    }

    .pass-card h2 {
      margin-bottom: 20px;
      color: #0f172a;
      font-size: 20px;
    }

    .pass-card input[type="password"] {
      width: 100%;
      padding: 10px 15px;
      margin-bottom: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
    }

    .pass-card button {
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .pass-card button:hover {
      background-color: #1d4ed8;
    }

    .error-msg {
      color: #ef4444;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    /* アプリ画面 */
    #app-screen {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* コントロールUI */
    .control-panel {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      padding: 15px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 280px;
      backdrop-filter: blur(5px);
    }

    .select-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .select-group label {
      font-size: 12px;
      font-weight: bold;
      color: #475569;
    }

    .select-group select {
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      background-color: #fff;
    }

    .btn-search {
      padding: 10px;
      background-color: #059669;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
      transition: background-color 0.2s;
    }

    .btn-search:hover {
      background-color: #047857;
    }

    /* マップエリア */
    #map {
      width: 100%;
      height: 100%;
      background-color: #e2e8f0;
    }

    /* パルスアニメーションマーカー */
    .animated-pulse-icon {
      width: 16px;
      height: 16px;
      background-color: #2563eb;
      border: 2px solid white;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.8);
      animation: pulse-animation 1.2s infinite ease-in-out;
    }

    @keyframes pulse-animation {
      0% {
        transform: scale(0.8);
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7);
      }
      70% {
        transform: scale(1.2);
        box-shadow: 0 0 0 10px rgba(37, 99, 235, 0);
      }
      100% {
        transform: scale(0.8);
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
      }
    }
  </style>
</head>

      ["2g_stair", "bridge_2_3"], ["bridge_2_3", "3g_stair"],
      ["3g_1f_計測実験室", "3g_stair"], ["3g_4f_特別教室", "3g_stair"],
      ["3g_stair", "bridge_3_4"], ["bridge_3_4", "4g_stair"],
      ["4g_1f_機械システム系", "4g_stair"], ["4g_4f_パソコン3", "4g_stair"]
    ];

    function getDistance(pos1, pos2) {
      const dy = pos1[0] - pos2[0];
      const dx = pos1[1] - pos2[1];
      return Math.sqrt(dy * dy + dx * dx);
    }

    function findShortestPath(startKey, endKey) {
      const distances = {};
      const previous = {};
      const unvisited = new Set();

      Object.keys(allNodes).forEach(node => {
        distances[node] = Infinity;
        previous[node] = null;
        unvisited.add(node);
      });

      distances[startKey] = 0;

      while (unvisited.size > 0) {
        let current = null;
        let nearestDist = Infinity;

        unvisited.forEach(node => {
          if (distances[node] < nearestDist) {
            nearestDist = distances[node];
            current = node;
          }
        });

        if (current === null || current === endKey) break;

        unvisited.delete(current);

        edges.forEach(([u, v]) => {
          let neighbor = null;
          if (u === current) neighbor = v;
          if (v === current) neighbor = u;

          if (neighbor && unvisited.has(neighbor)) {
            const alt = distances[current] + getDistance(allNodes[current].pos, allNodes[neighbor].pos);
            if (alt < distances[neighbor]) {
              distances[neighbor] = alt;
              previous[neighbor] = current;
            }
          }
        });
      }

      const path = [];
      let curr = endKey;
      while (curr !== null) {
        path.unshift(curr);
        curr = previous[curr];
      }

      if (path[0] !== startKey) {
        return [startKey, endKey];
      }

      return path;
    }

    function initMap() {
      if (map) return;

      const bounds = [[-700, 0], [0, 1000]];

      map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1.5,
        maxZoom: 2,
        maxBounds: bounds,
        zoomControl: false
      });

      L.imageOverlay('R8教室配置図-1.png', bounds).addTo(map);
      map.fitBounds(bounds);

      const startSelect = document.getElementById('startSelect');
      const endSelect = document.getElementById('endSelect');

      Object.keys(spots).forEach(key => {
        const spot = spots[key];

        const optStart = document.createElement('option');
        optStart.value = key; optStart.textContent = spot.name;
        startSelect.appendChild(optStart);

        const optEnd = document.createElement('option');
        optEnd.value = key; optEnd.textContent = spot.name;
        endSelect.appendChild(optEnd);
      });

      startSelect.value = "1g_1f_3s4";
      endSelect.value = "1g_4f_2a2";

      showRoute();
    }

    function showRoute() {
      const startKey = document.getElementById('startSelect').value;
      const endKey = document.getElementById('endSelect').value;

      if (startKey === endKey) {
        alert("出発地と目的地が異なる場所を選択してください");
        return;
      }

      if (activeLine) map.removeLayer(activeLine);
      if (startMarker) map.removeLayer(startMarker);
      if (endMarker) map.removeLayer(endMarker);
      if (animMarker) map.removeLayer(animMarker);
      if (animTimer) clearInterval(animTimer);

      const startSpot = spots[startKey];
      const endSpot = spots[endKey];

      const pathKeys = findShortestPath(startKey, endKey);
      const pathCoords = pathKeys.map(k => allNodes[k].pos);

      startMarker = L.marker(startSpot.pos).addTo(map).bindPopup(`<b>[出発地] ${startSpot.name}</b>`).openPopup();
      endMarker = L.marker(endSpot.pos).addTo(map).bindPopup(`<b>[目的地] ${endSpot.name}</b>`);

      activeLine = L.polyline(pathCoords, {
        color: '#2563eb',
        weight: 5,
        dashArray: '8, 8',
        opacity: 0.8
      }).addTo(map);

      const pulseIcon = L.divIcon({
        className: 'animated-pulse-icon',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });

      animMarker = L.marker(pathCoords[0], { icon: pulseIcon }).addTo(map);

      let pathIndex = 0;
      let step = 0;
      const stepsPerSegment = 25;

      animTimer = setInterval(() => {
        step++;
        if (step > stepsPerSegment) {
          step = 0;
          pathIndex++;
          if (pathIndex >= pathCoords.length - 1) {
            pathIndex = 0;
          }
        }

        const p1 = pathCoords[pathIndex];
        const p2 = pathCoords[pathIndex + 1];
        const progress = step / stepsPerSegment;

        const currentY = p1[0] + (p2[0] - p1[0]) * progress;
        const currentX = p1[1] + (p2[1] - p1[1]) * progress;

        animMarker.setLatLng([currentY, currentX]);
      }, 25);

      map.fitBounds(activeLine.getBounds(), { padding: [100, 100] });
    }
  </script>
