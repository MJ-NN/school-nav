<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校内案内マップ - フロアナビ</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #cbd5e1; }

    /* 認証画面 */
    #pass-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #0f172a; display: flex; justify-content: center; align-items: center;
      z-index: 9999; transition: opacity 0.3s;
    }
    .pass-card {
      background: #ffffff; padding: 30px 40px; border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 320px;
    }
    .pass-card h2 { margin-bottom: 20px; color: #0f172a; font-size: 20px; }
    .pass-card input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; }
    .pass-card button { width: 100%; padding: 10px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .error-msg { color: #ef4444; font-size: 14px; margin-top: 10px; display: none; }

    /* メインアプリ */
    #app-screen { display: none; width: 100%; height: 100%; position: relative; }

    /* 階数タブ */
    .floor-tabs {
      position: absolute; top: 15px; right: 15px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); padding: 6px; border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; gap: 4px;
    }
    .floor-tab {
      padding: 6px 12px; border: 1px solid #e2e8f0; border-radius: 6px;
      background: white; font-weight: bold; font-size: 13px; cursor: pointer; color: #475569;
    }
    .floor-tab.active { background: #2563eb; color: white; border-color: #2563eb; }

    /* 操作パネル */
    .control-panel {
      position: absolute; top: 15px; left: 15px; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 10px;
      width: 320px; max-height: calc(100vh - 30px); overflow-y: auto;
    }
    .select-group { display: flex; flex-direction: column; gap: 4px; }
    .select-group label { font-size: 12px; font-weight: bold; color: #475569; }
    .select-group select { padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
    .btn-search { padding: 10px; background-color: #059669; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

    /* ステップナビ */
    #step-guide { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .step-card { background: #f1f5f9; border-left: 4px solid #2563eb; padding: 10px; border-radius: 4px; font-size: 13px; }
    .step-btn { margin-top: 6px; padding: 4px 8px; background: #2563eb; color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; }

    #map { width: 100%; height: 100%; background-color: #cbd5e1; }

    /* アニメーションアイコン */
    .animated-pulse-icon {
      width: 16px; height: 16px; background-color: #2563eb; border: 2px solid white; border-radius: 50%;
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.8); animation: pulse 1.2s infinite ease-in-out;
    }
    .escalator-pulse-icon {
      width: 24px; height: 24px; background-color: #f59e0b; border: 2px solid white; border-radius: 50%;
      color: white; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.9); animation: pulse 0.8s infinite ease-in-out;
    }
    @keyframes pulse { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(0.8); } }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="pass-screen">
    <div class="pass-card">
      <h2>校内案内マップ</h2>
      <input type="password" id="passInput" placeholder="パスワードを入力">
      <button onclick="checkPassword()">ログイン</button>
      <div id="errorMsg" class="error-msg">パスワードが違います</div>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="app-screen">
    <div class="floor-tabs">
      <button class="floor-tab active" onclick="switchFloor(1)">1F</button>
      <button class="floor-tab" onclick="switchFloor(2)">2F</button>
      <button class="floor-tab" onclick="switchFloor(3)">3F</button>
      <button class="floor-tab" onclick="switchFloor(4)">4F</button>
      <button class="floor-tab" onclick="switchFloor(5)">5F</button>
      <button class="floor-tab" onclick="switchFloor(6)">6F</button>
      <button class="floor-tab" onclick="switchFloor(7)">7F</button>
      <button class="floor-tab" onclick="switchFloor(8)">8F</button>
    </div>

    <div class="control-panel">
      <div class="select-group">
        <label>🚩 出発地</label>
        <select id="startSelect"></select>
      </div>
      <div class="select-group">
        <label>🎯 目的地</label>
        <select id="endSelect"></select>
      </div>
      <button class="btn-search" onclick="calculateRoute()">ルート案内を開始</button>
      <div id="step-guide"></div>
    </div>
    
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const CORRECT_PASSWORD = "meijo2026";
    let map = null;
    let activeLines = [], activeMarkers = [], animMarker = null, animTimer = null;

    // 画像の絶対枠領域
    const imageBounds = [[-1000, 0], [0, 1000]];

    const spots = {
      "1g_1f_3s4": { name: "1号館 1F 3S4", floor: 1, pos: [-657, 228] },
      "1g_1f_保健室": { name: "1号館 1F 保健室", floor: 1, pos: [-634, 278] },
      "1g_1f_事務室": { name: "1号館 1F 事務室", floor: 1, pos: [-561, 351] },
      "1g_2f_2a1": { name: "1号館 2F 2A1", floor: 2, pos: [-425, 228] },
      "1g_2f_3a1": { name: "1号館 2F 3A1", floor: 2, pos: [-422, 272] },
      "1g_3f_3a2": { name: "1号館 3F 3A2", floor: 3, pos: [-271, 225] },
      "1g_3f_生物室": { name: "1号館 3F 生物室", floor: 3, pos: [-280, 359] },
      "1g_4f_2a2": { name: "1号館 4F 2A2", floor: 4, pos: [-133, 226] },
      "1g_4f_2a8": { name: "1号館 4F 2A8", floor: 4, pos: [-206, 274] },
      "1g_7f_職員室": { name: "1号館 7F 職員室", floor: 7, pos: [-296, 140] },
      "1g_8f_ict2": { name: "1号館 8F ICT2", floor: 8, pos: [-145, 126] }
    };

    const floorEscalators = {
      1: { name: "1F エスカレーター", pos: [-570, 298] },
      2: { name: "2F エスカレーター", pos: [-450, 298] },
      3: { name: "3F エスカレーター", pos: [-320, 298] },
      4: { name: "4F エスカレーター", pos: [-180, 298] },
      5: { name: "5F エスカレーター", pos: [-600, 175] },
      6: { name: "6F エスカレーター", pos: [-450, 175] },
      7: { name: "7F エスカレーター", pos: [-320, 175] },
      8: { name: "8F エスカレーター", pos: [-180, 175] }
    };

    function checkPassword() {
      if (document.getElementById('passInput').value === CORRECT_PASSWORD) {
        document.getElementById('pass-screen').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('pass-screen').style.display = 'none';
          document.getElementById('app-screen').style.display = 'block';
          initMap();
        }, 300);
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    document.getElementById('passInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    function initMap() {
      if (map) return;

      map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -3,
        maxZoom: 3,
        zoomControl: false
      });

      // 配置図画像を重ねる
      const overlay = L.imageOverlay('R8教室配置図-1.png', imageBounds).addTo(map);

      // プルダウンのセットアップ
      const startSelect = document.getElementById('startSelect');
      const endSelect = document.getElementById('endSelect');
      Object.keys(spots).forEach(key => {
        startSelect.add(new Option(spots[key].name, key));
        endSelect.add(new Option(spots[key].name, key));
      });
      startSelect.value = "1g_1f_3s4";
      endSelect.value = "1g_4f_2a2";

      // 画像全体を確実に画面に収める
      map.invalidateSize();
      map.fitBounds(imageBounds);
    }

    function switchFloor(floorNum) {
      document.querySelectorAll('.floor-tab').forEach((tab, i) => {
        tab.classList.toggle('active', i + 1 === floorNum);
      });

      if (map) {
        map.invalidateSize();
        // 画像全体が画面に収まるように表示
        map.fitBounds(imageBounds);
      }
    }

    function calculateRoute() {
      const startKey = document.getElementById('startSelect').value;
      const endKey = document.getElementById('endSelect').value;
      if (startKey === endKey) { alert("出発地と目的地を変えてください。"); return; }

      activeLines.forEach(l => map.removeLayer(l));
      activeMarkers.forEach(m => map.removeLayer(m));
      if (animMarker) map.removeLayer(animMarker);
      if (animTimer) clearInterval(animTimer);
      activeLines = []; activeMarkers = [];

      const start = spots[startKey];
      const end = spots[endKey];
      const guideContainer = document.getElementById('step-guide');

      if (start.floor === end.floor) {
        switchFloor(start.floor);
        const line = L.polyline([start.pos, end.pos], { color: '#2563eb', weight: 5 }).addTo(map);
        const m1 = L.marker(start.pos).addTo(map).bindPopup(`<b>出発: ${start.name}</b>`).openPopup();
        const m2 = L.marker(end.pos).addTo(map).bindPopup(`<b>到着: ${end.name}</b>`);
        activeLines.push(line);
        activeMarkers.push(m1, m2);

        guideContainer.innerHTML = `<div class="step-card"><strong>📍 ${start.floor}F内移動</strong>${start.name} ➔ ${end.name}</div>`;
        startNormalAnimation([start.pos, end.pos]);
      } else {
        switchFloor(start.floor);
        const startEsc = floorEscalators[start.floor];
        const endEsc = floorEscalators[end.floor];

        const lineStart = L.polyline([start.pos, startEsc.pos], { color: '#2563eb', weight: 5, dashArray: '6,6' }).addTo(map);
        const lineEsc = L.polyline([startEsc.pos, endEsc.pos], { color: '#f59e0b', weight: 6, dashArray: '4,8' }).addTo(map);
        const lineEnd = L.polyline([endEsc.pos, end.pos], { color: '#059669', weight: 5 }).addTo(map);

        const mStart = L.marker(start.pos).addTo(map).bindPopup(`<b>出発: ${start.name}</b>`).openPopup();
        const mEsc1 = L.marker(startEsc.pos).addTo(map).bindPopup(`<b>エスカレーター乗り場</b>`);
        const mEsc2 = L.marker(endEsc.pos).addTo(map).bindPopup(`<b>${end.floor}F エスカレーター降り口</b>`);
        const mEnd = L.marker(end.pos).addTo(map).bindPopup(`<b>到着: ${end.name}</b>`);

        activeLines.push(lineStart, lineEsc, lineEnd);
        activeMarkers.push(mStart, mEsc1, mEsc2, mEnd);

        guideContainer.innerHTML = `
          <div class="step-card">
            <strong>Step 1: ${start.floor}F エスカレーターへ</strong>
            ${start.name} ➔ エスカレーター
          </div>
          <div class="step-card" style="border-left-color: #f59e0b;">
            <strong>Step 2: ⚡ エスカレーターで階移動</strong>
            ${start.floor}F ➔ <strong>${end.floor}F</strong>
          </div>
          <div class="step-card" style="border-left-color: #059669;">
            <strong>Step 3: ${end.floor}F 目的地へ</strong>
            エスカレーター ➔ ${end.name}
          </div>
        `;

        startEscalatorSequence(start.pos, startEsc.pos, endEsc.pos, end.pos, start.floor, end.floor);
      }
    }

    function startNormalAnimation(pathCoords) {
      const pulseIcon = L.divIcon({ className: 'animated-pulse-icon', iconSize: [16, 16], iconAnchor: [8, 8] });
      animMarker = L.marker(pathCoords[0], { icon: pulseIcon }).addTo(map);
      let step = 0;
      animTimer = setInterval(() => {
        step = (step + 1) % 30;
        const progress = step / 30;
        animMarker.setLatLng([
          pathCoords[0][0] + (pathCoords[1][0] - pathCoords[0][0]) * progress,
          pathCoords[0][1] + (pathCoords[1][1] - pathCoords[0][1]) * progress
        ]);
      }, 30);
    }

    function startEscalatorSequence(pStart, pEsc1, pEsc2, pEnd, fStart, fEnd) {
      const normalIcon = L.divIcon({ className: 'animated-pulse-icon', iconSize: [16, 16], iconAnchor: [8, 8] });
      const escIcon = L.divIcon({ className: 'escalator-pulse-icon', html: '⚡', iconSize: [24, 24], iconAnchor: [12, 12] });

      animMarker = L.marker(pStart, { icon: normalIcon }).addTo(map);
      let phase = 0, step = 0;

      animTimer = setInterval(() => {
        step++;
        const progress = step / 40;

        if (phase === 0) {
          animMarker.setLatLng([
            pStart[0] + (pEsc1[0] - pStart[0]) * progress,
            pStart[1] + (pEsc1[1] - pStart[1]) * progress
          ]);
          if (step >= 40) { phase = 1; step = 0; animMarker.setIcon(escIcon); switchFloor(fEnd); }
        } else if (phase === 1) {
          animMarker.setLatLng([
            pEsc1[0] + (pEsc2[0] - pEsc1[0]) * progress,
            pEsc1[1] + (pEsc2[1] - pEsc1[1]) * progress
          ]);
          if (step >= 40) { phase = 2; step = 0; animMarker.setIcon(normalIcon); }
        } else if (phase === 2) {
          animMarker.setLatLng([
            pEsc2[0] + (pEnd[0] - pEsc2[0]) * progress,
            pEsc2[1] + (pEnd[1] - pEsc2[1]) * progress
          ]);
          if (step >= 40) { phase = 0; step = 0; switchFloor(fStart); }
        }
      }, 30);
    }
  </script>
</body>
</html>
