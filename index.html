  let markers = {};

  // 既存ピンの描画
  Object.keys(spots).forEach(key => {
    addMarkerToMap(key, spots[key].name, spots[key].pos);
  });

  // マップクリックで新規ピン追加
  let newCount = 1;
  map.on('click', function(e) {
    const name = prompt("追加する部屋の名前を入力してください（例: 1号館 1F 事務室）:", `新規スポット ${newCount}`);
    if (!name) return;

    const key = `new_spot_${Date.now()}`;
    const pos = [Math.round(e.latlng.lat), Math.round(e.latlng.lng)];
    spots[key] = { name: name, pos: pos };

    addMarkerToMap(key, name, pos);
    newCount++;
  });

  function addMarkerToMap(key, name, pos) {
    const marker = L.marker(pos, { draggable: true }).addTo(map);
    marker.bindTooltip(name, { permanent: true, direction: 'top' });

    marker.on('dragend', function(e) {
      const newPos = e.target.getLatLng();
      spots[key].pos = [Math.round(newPos.lat), Math.round(newPos.lng)];
    });

    markers[key] = marker;
  }

  function copyData() {
    const jsonStr = JSON.stringify(spots, null, 2);
    navigator.clipboard.writeText(jsonStr).then(() => {
      alert("全座標データをクリップボードにコピーしました！メッセージ欄に貼り付けて送信してください。");
    }).catch(err => {
      console.log(jsonStr);
      alert("コピーに失敗しました。コンソール出力をご確認ください。");
    });
  }
