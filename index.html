  function initMap() {
    if (map) return;

    map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -1.5,
      maxZoom: 2
    });

    const imgWidth = 1400;
    const imgHeight = 1000;
    const bounds = [[0, 0], [imgHeight, imgWidth]];

    L.imageOverlay('R8教室配置図-1.png', bounds).addTo(map);
    map.fitBounds(bounds);

    const startSelect = document.getElementById('startSelect');
    const endSelect = document.getElementById('endSelect');

    // 全ピンの読み込み＆ドロップダウン作成
    Object.keys(spots).forEach(key => {
      const spot = spots[key];
      
      const optStart = document.createElement('option');
      optStart.value = key;
      optStart.textContent = spot.name;
      startSelect.appendChild(optStart);

      const optEnd = document.createElement('option');
      optEnd.value = key;
      optEnd.textContent = spot.name;
      endSelect.appendChild(optEnd);

      // ピンの生成＆吹き出し（Popup）の設定
      L.marker(spot.pos).addTo(map).bindPopup(`<b>${spot.name}</b>`);
    });

    // 初期値（2A1 -> 3A1）
    startSelect.value = "2f_2a1";
    endSelect.value = "2f_3a1";
  }

  function showRoute() {
    const startKey = document.getElementById('startSelect').value;
    const endKey = document.getElementById('endSelect').value;

    if (startKey === endKey) {
      alert("出発地と目的地が異なる場所を選択してください");
      return;
    }

    if (activeLine) map.removeLayer(activeLine);

    const startPos = spots[startKey].pos;
    const endPos = spots[endKey].pos;

    // 赤い破線で案内ラインを引く
    activeLine = L.polyline([startPos, endPos], {
      color: '#e53e3e',
      weight: 6,
      dashArray: '8, 8',
      opacity: 0.9
    }).addTo(map);

    // ルート全体が画面に収まるようにズーム＆移動
    map.fitBounds(activeLine.getBounds(), { padding: [60, 60] });
  }
