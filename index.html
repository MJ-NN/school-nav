    :root {
      --primary-color: #0f172a;
      --accent-color: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --glass-bg: rgba(255, 255, 255, 0.92);
      --glass-border: rgba(255, 255, 255, 0.4);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    * { box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
    body { margin: 0; padding: 0; background: #cbd5e1; color: #334155; overflow: hidden; }

    #pass-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); padding: 40px 32px; border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); text-align: center;
      width: 90%; max-width: 380px; animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .login-card .logo-badge {
      display: inline-block; background: #eff6ff; color: var(--accent-color);
      font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 0.05em;
    }
    .login-card h2 { margin: 0 0 8px 0; color: var(--primary-color); font-size: 20px; font-weight: 700; line-height: 1.4; }
    .login-card p { font-size: 13px; color: #64748b; margin: 0 0 24px 0; line-height: 1.5; }
    .login-card input {
      width: 100%; padding: 12px 16px; font-size: 15px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; margin-bottom: 16px; text-align: center; outline: none; transition: all 0.2s;
    }
    .login-card input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
    .login-card button {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 600; color: white;
      background: var(--accent-color); border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.2s, transform 0.1s; box-shadow: var(--shadow-md);
    }
    .login-card button:hover { background: var(--accent-hover); }
    .login-card button:active { transform: scale(0.98); }
    .error-msg { color: #ef4444; font-size: 12px; margin-top: 12px; font-weight: 500; display: none; }

    #app-screen { display: none; height: 100vh; width: 100vw; position: relative; }
    #map { height: 100vh; width: 100vw; background: #cbd5e1; z-index: 1; }
    #mapError {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1500;
      background: #fee2e2; color: #991b1b; padding: 8px 16px; border-radius: 10px; font-size: 12px;
      font-weight: 600; display: none; box-shadow: var(--shadow-md);
    }

    .control-panel {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 1000; width: 92%; max-width: 680px;
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 20px; padding: 16px 20px;
      box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 10px;
    }
    .select-group { display: flex; gap: 12px; width: 100%; }
    .select-box { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .select-box label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .select-wrapper { position: relative; }
    select {
      width: 100%; padding: 10px 14px; font-size: 14px; font-weight: 500;
      color: var(--primary-color); border: 1px solid #cbd5e1; border-radius: 10px;
      background-color: #ffffff; outline: none; cursor: pointer; appearance: none; transition: all 0.2s;
    }
    .select-wrapper::after {
      content: "▾"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 12px; color: #94a3b8; pointer-events: none;
    }
    select:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }

    .btn-help {
      background: none; border: none; color: #2563eb; font-size: 12px; font-weight: 600;
      cursor: pointer; text-decoration: underline; padding: 2px 0; align-self: flex-start;
      display: flex; align-items: center; gap: 4px;
    }
    .btn-help:hover { color: #1d4ed8; }

    .btn-nav {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 700; color: white;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;

    .btn-nav:hover { box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4); transform: translateY(-1px); }

      font-size: 12px; color: #475569; background: #f1f5f9; border-radius: 10px;
      padding: 8px 12px; display: none;
    }
    #routeSummary b { color: var(--primary-color); }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
      z-index: 9000; display: none; justify-content: center; align-items: center;
    }
    .modal-card {
      background: white; border-radius: 20px; padding: 24px; width: 90%; max-width: 520px;
      max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: fadeIn 0.2s ease-out;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header h3 { margin: 0; font-size: 18px; color: var(--primary-color); }
    .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; }

    .hint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .hint-card {
      border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: all 0.2s; text-align: center; background: #f8fafc;
    }
    .hint-card:hover { border-color: var(--accent-color); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .hint-card img { width: 100%; height: 100px; object-fit: cover; background: #e2e8f0; }
    .hint-card-title { font-size: 12px; font-weight: 700; padding: 8px 6px; color: #334155; }

    .animated-pulse-icon {
      background: #2563eb; border: 3px solid #ffffff; border-radius: 50%;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.8);

    .stair-icon {
      width: 22px; height: 22px; border-radius: 4px; border: 2px solid #92400e;
      background: repeating-linear-gradient(45deg, #fbbf24, #fbbf24 4px, #92400e 4px, #92400e 8px);

    .escalator-icon {
      width: 26px; height: 26px; border-radius: 4px; border: 2px solid #065f46;
      background: #10b981; color: white; font-size: 8px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1;
    }

    @media (max-width: 640px) {
      .control-panel { bottom: 12px; padding: 14px; }
      .select-group { flex-direction: column; gap: 8px; }

      "3g_4f_特別教室": { "name": "3号館 4F 特別教室", "pos": [-130, 872] },
      "3g_4f_作法室": { "name": "3号館 4F 作法室", "pos": [-196, 872] },
      "4g_1f_機械システム系": { "name": "4号館 1F 機械システム系", "pos": [-330, 690] },
      "4g_1f_原動機実習室": { "name": "4号館 1F 原動機実習室", "pos": [-432, 674] },
      "4g_1f_cam実習室": { "name": "4号館 1F CAM実習室", "pos": [-493, 673] },
      "4g_2f_印刷室": { "name": "4号館 2F 印刷室", "pos": [-402, 734] },
      "4g_2f_機械システム管理室": { "name": "4号館 2F 機械システム管理室", "pos": [-437, 747] },
      "4g_3f_cad1": { "name": "4号館 3F CAD室1", "pos": [-438, 816] },
      "4g_3f_cad2": { "name": "4号館 3F CAD室2", "pos": [-461, 811] },
      "4g_4f_パソコン3": { "name": "4号館 4F パソコン教室3", "pos": [-443, 881] },
      "4g_4f_パソコン4": { "name": "4号館 4F パソコン教室4", "pos": [-482, 874] },
      "4g_4f_商業管理室": { "name": "4号館 4F 商業管理室", "pos": [-511, 877] }
    };

    const hintLandmarks = [
      { key: "1g_1f_事務室", title: "1号館1F 事務室前", img: "https://via.placeholder.com/150/2563eb/ffffff?text=1F+事務室" },
      { key: "2g_1f_図書館", title: "2号館1F 図書館前", img: "https://via.placeholder.com/150/2563eb/ffffff?text=2F+図書館" },
      { key: "1g_7f_職員室", title: "1号館7F 職員室前", img: "https://via.placeholder.com/150/2563eb/ffffff?text=7F+職員室" },
      { key: "2g_4f_購買", title: "2号館4F 購買前", img: "https://via.placeholder.com/150/2563eb/ffffff?text=4F+購買" }
    ];

    // ==========================================================================
    // ③ 階段・エスカレーターのノードを手動で定義する
    //    ★★★ ここが今回の本質的な修正点です ★★★
    //    実際の図面を見て、各棟・各階の「階段の実際の座標(pos)」に書き換えてください。
    //    - stairNodes: 各棟・各階に何本でも置ける。同じ stairId のノードが縦につながる。
    //    - escalatorNodes: 定義上、2階・4階・6階のみで乗り降り可能。
    //      (=1階・3階・5階・7階・8階にはエスカレーターの乗降ノードを作らない)
    // ==========================================================================
    const stairNodes = [
      // { id: 一意なID, building: 棟, floor: 階, stairId: 同じ階段グループの識別子, pos: [y, x] }
      // --- 1号館 階段A（例: 東側階段） TODO: 実座標に置き換え ---
      { id: "1g_stairA_1f", building: "1g", floor: 1, stairId: "1g_stairA", pos: [-600, 400] },
      { id: "1g_stairA_2f", building: "1g", floor: 2, stairId: "1g_stairA", pos: [-460, 400] },
      { id: "1g_stairA_3f", building: "1g", floor: 3, stairId: "1g_stairA", pos: [-310, 400] },
      { id: "1g_stairA_4f", building: "1g", floor: 4, stairId: "1g_stairA", pos: [-170, 400] },
      { id: "1g_stairA_5f", building: "1g", floor: 5, stairId: "1g_stairA", pos: [-600, 155] },
      { id: "1g_stairA_6f", building: "1g", floor: 6, stairId: "1g_stairA", pos: [-460, 155] },
      { id: "1g_stairA_7f", building: "1g", floor: 7, stairId: "1g_stairA", pos: [-320, 135] },
      { id: "1g_stairA_8f", building: "1g", floor: 8, stairId: "1g_stairA", pos: [-180, 150] },
      // --- 2号館 階段 TODO ---
      { id: "2g_stairA_1f", building: "2g", floor: 1, stairId: "2g_stairA", pos: [-600, 480] },
      { id: "2g_stairA_2f", building: "2g", floor: 2, stairId: "2g_stairA", pos: [-470, 480] },
      { id: "2g_stairA_4f", building: "2g", floor: 4, stairId: "2g_stairA", pos: [-200, 520] },
      // --- 3号館 階段 TODO ---
      { id: "3g_stairA_1f", building: "3g", floor: 1, stairId: "3g_stairA", pos: [-155, 700] },
      { id: "3g_stairA_2f", building: "3g", floor: 2, stairId: "3g_stairA", pos: [-160, 760] },
      { id: "3g_stairA_3f", building: "3g", floor: 3, stairId: "3g_stairA", pos: [-140, 810] },
      { id: "3g_stairA_4f", building: "3g", floor: 4, stairId: "3g_stairA", pos: [-160, 870] },
      // --- 4号館 階段 TODO ---
      { id: "4g_stairA_1f", building: "4g", floor: 1, stairId: "4g_stairA", pos: [-400, 690] },
      { id: "4g_stairA_2f", building: "4g", floor: 2, stairId: "4g_stairA", pos: [-420, 745] },
      { id: "4g_stairA_3f", building: "4g", floor: 3, stairId: "4g_stairA", pos: [-450, 815] },
      { id: "4g_stairA_4f", building: "4g", floor: 4, stairId: "4g_stairA", pos: [-460, 878] }
    ];

    const escalatorNodes = [
      // エスカレーターは 2F・4F・6F のみ乗降可能。それ以外の階のノードは作らない。
      { id: "1g_escA_2f", building: "1g", floor: 2, escId: "1g_escA", pos: [-500, 250] }, // TODO
      { id: "1g_escA_4f", building: "1g", floor: 4, escId: "1g_escA", pos: [-200, 250] }, // TODO
      { id: "1g_escA_6f", building: "1g", floor: 6, escId: "1g_escA", pos: [-500, 150] }  // TODO
    ];

    // 各棟・各階に自動生成する「廊下代表点」（部屋群の重心）。
    // 実際の廊下形状に合わせて手動で座標を上書きしても構いません。
    function buildCorridorNodes() {
      const groups = {}; // key: "building_floor" -> [pos,...]
      Object.keys(spots).forEach(key => {
        const m = key.match(/^(\d+g)_(\d+)f_/);
        if (!m) return;
        const building = m[1], floor = parseInt(m[2], 10);
        const gkey = building + "_" + floor;
        (groups[gkey] = groups[gkey] || []).push(spots[key].pos);
      });
      const corridors = {};
      Object.keys(groups).forEach(gkey => {
        const pts = groups[gkey];
        const avgY = pts.reduce((s, p) => s + p[0], 0) / pts.length;
        const avgX = pts.reduce((s, p) => s + p[1], 0) / pts.length;
        corridors[gkey] = { id: "corridor_" + gkey, pos: [avgY, avgX] };
      });
      return corridors;
    }

    // 棟と棟をつなぐ連絡通路（渡り廊下など）。
    // TODO: 実際に建物間が繋がっている階・座標に合わせて追加/修正してください。
    const buildingConnectors = [
      // { fromBuilding, fromFloor, toBuilding, toFloor }
      { fromBuilding: "1g", fromFloor: 1, toBuilding: "2g", toFloor: 1 },
      { fromBuilding: "2g", fromFloor: 1, toBuilding: "3g", toFloor: 1 },
      { fromBuilding: "3g", fromFloor: 1, toBuilding: "4g", toFloor: 1 }
    ];

    // ==========================================================================
    // ④ グラフ構築 + ダイクストラ法による最短経路探索
    // ==========================================================================
    let graphNodes = {}; // id -> { pos:[y,x], meta:{...} }
    let graphAdj = {};   // id -> [{to, w}]

    function dist(a, b) {
      const dy = a[0] - b[0], dx = a[1] - b[1];
      return Math.sqrt(dy * dy + dx * dx);
    }

    function addNode(id, pos, meta) {
      graphNodes[id] = { pos, meta: meta || {} };
      if (!graphAdj[id]) graphAdj[id] = [];
    }
    function addEdge(a, b, weight, meta) {
      if (!(a in graphNodes) || !(b in graphNodes)) return;
      const w = weight != null ? weight : dist(graphNodes[a].pos, graphNodes[b].pos);
      graphAdj[a].push({ to: b, w, meta: meta || {} });
      graphAdj[b].push({ to: a, w, meta: meta || {} });
    }

    const STAIR_VERTICAL_COST = 60;      // 階段1フロア分の追加コスト
    const ESCALATOR_VERTICAL_COST = 20;  // エスカレーターは階段より速い想定

    function buildGraph() {
      graphNodes = {};
      graphAdj = {};

      const corridors = buildCorridorNodes();

      // 廊下ノード登録
      Object.keys(corridors).forEach(gkey => {
        const c = corridors[gkey];
        const [building, floorStr] = gkey.split("_");
        addNode(c.id, c.pos, { type: "corridor", building, floor: parseInt(floorStr, 10) });
      });

      // 各部屋 -> 同じ棟・階の廊下ノードへ接続
      Object.keys(spots).forEach(key => {
        const m = key.match(/^(\d+g)_(\d+)f_/);
        if (!m) return;
        const building = m[1], floor = parseInt(m[2], 10);
        const gkey = building + "_" + floor;
        addNode(key, spots[key].pos, { type: "room", building, floor });
        if (corridors[gkey]) addEdge(key, corridors[gkey].id);
      });

      // 階段ノード登録 + 同一 stairId 内で上下階を接続
      const stairGroups = {};
      stairNodes.forEach(s => {
        addNode(s.id, s.pos, { type: "stair", building: s.building, floor: s.floor, groupId: s.stairId });
        (stairGroups[s.stairId] = stairGroups[s.stairId] || []).push(s);
        // 同じ階の廊下ノードと接続
        const gkey = s.building + "_" + s.floor;
        if (corridors[gkey]) addEdge(s.id, corridors[gkey].id);
      });
      Object.values(stairGroups).forEach(group => {
        group.sort((a, b) => a.floor - b.floor);
        for (let i = 0; i < group.length - 1; i++) {
          const floorDiff = group[i + 1].floor - group[i].floor;
          addEdge(group[i].id, group[i + 1].id, STAIR_VERTICAL_COST * floorDiff, { via: "stairs" });
        }
      });

      // エスカレーターノード登録（2F/4F/6Fのみ存在させる）+ 同一escId内で接続
      const escGroups = {};
      escalatorNodes.forEach(e => {
        if (![2, 4, 6].includes(e.floor)) return; // 安全策：それ以外の階は無視
        addNode(e.id, e.pos, { type: "escalator", building: e.building, floor: e.floor, groupId: e.escId });
        (escGroups[e.escId] = escGroups[e.escId] || []).push(e);
        const gkey = e.building + "_" + e.floor;
        if (corridors[gkey]) addEdge(e.id, corridors[gkey].id);
      });
      Object.values(escGroups).forEach(group => {
        group.sort((a, b) => a.floor - b.floor);
        for (let i = 0; i < group.length - 1; i++) {
          const floorDiff = group[i + 1].floor - group[i].floor;
          addEdge(group[i].id, group[i + 1].id, ESCALATOR_VERTICAL_COST * floorDiff, { via: "escalator" });
        }
      });

      // 棟間の連絡通路
      buildingConnectors.forEach(c => {
        const fromKey = c.fromBuilding + "_" + c.fromFloor;
        const toKey = c.toBuilding + "_" + c.toFloor;
        if (corridors[fromKey] && corridors[toKey]) {
          addEdge(corridors[fromKey].id, corridors[toKey].id);
        }
      });
    }

    function dijkstra(startId, endId) {
      const distMap = {}; const prev = {}; const visited = new Set();
      Object.keys(graphAdj).forEach(id => { distMap[id] = Infinity; });
      if (!(startId in distMap) || !(endId in distMap)) return null;
      distMap[startId] = 0;
      const queue = [[0, startId]];
      while (queue.length) {
        queue.sort((a, b) => a[0] - b[0]);
        const [d, u] = queue.shift();
        if (visited.has(u)) continue;
        visited.add(u);
        if (u === endId) break;
        (graphAdj[u] || []).forEach(edge => {
          if (visited.has(edge.to)) return;
          const nd = d + edge.w;
          if (nd < distMap[edge.to]) {
            distMap[edge.to] = nd;
            prev[edge.to] = { node: u, edge };
            queue.push([nd, edge.to]);
          }
        });
      }
      if (distMap[endId] === Infinity) return null;
      const path = []; let cur = endId;
      while (cur !== startId) {
        const step = prev[cur];
        path.unshift({ node: cur, via: step ? step.edge.meta.via : null });
        cur = step.node;
      }
      path.unshift({ node: startId, via: null });
      return path;
    }

    // ==========================================================================
    // ⑤ UI・描画
    // ==========================================================================
    // ==========================================================================
    // 座標取得モード：地図をクリックすると、その地点の正確な [y, x] 座標を
    // 表示＆クリップボードにコピーする。実画像の上でクリックするだけで
    // 各部屋・階段・エスカレーターの正確な座標を集められる。
    // 有効化方法：URLに ?calib=1 を付けるか、キーボードで "c" キーを押す。
    // ==========================================================================
    let calibMode = false;
    let calibMarkers = [];

    function toggleCalibMode(forceOn) {
      calibMode = forceOn !== undefined ? forceOn : !calibMode;
      document.getElementById('calibBadge').style.display = calibMode ? 'block' : 'none';
      if (!calibMode) {
        calibMarkers.forEach(m => map.removeLayer(m));
        calibMarkers = [];
        document.getElementById('calibToast').style.display = 'none';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'c' || e.key === 'C') { if (map) toggleCalibMode(); }
    });

    function onCalibClick(e) {
      if (!calibMode) return;
      const y = Math.round(e.latlng.lat);
      const x = Math.round(e.latlng.lng);
      const text = `[${y}, ${x}]`;

      const marker = L.circleMarker(e.latlng, { radius: 6, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 1 }).addTo(map);
      calibMarkers.push(marker);

      const toast = document.getElementById('calibToast');
      toast.style.display = 'block';
      toast.textContent = text + ' をコピーしました';

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).catch(() => {});
      }
    }

    function initMap() {
      if (map) return;

      map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -2,
        maxZoom: 3,
        zoomControl: false,
        maxBounds: bounds,
        maxBoundsViscosity: 0.8
      });

      const overlay = L.imageOverlay(IMAGE_PATH, bounds);
      overlay.on('error', () => { document.getElementById('mapError').style.display = 'block'; });
      overlay.on('load', () => { document.getElementById('mapError').style.display = 'none'; });
      overlay.addTo(map);

      map.on('click', onCalibClick);
      const urlParamsCalib = new URLSearchParams(window.location.search);
      if (urlParamsCalib.get('calib') === '1') toggleCalibMode(true);

      const startSelect = document.getElementById('startSelect');
      const endSelect = document.getElementById('endSelect');

      Object.keys(spots).forEach(key => {
        const spot = spots[key];
        const optStart = document.createElement('option'); optStart.value = key; optStart.textContent = spot.name;
        startSelect.appendChild(optStart);
        const optEnd = document.createElement('option'); optEnd.value = key; optEnd.textContent = spot.name;
        endSelect.appendChild(optEnd);
      });

      const urlParams = new URLSearchParams(window.location.search);
      const paramStart = urlParams.get('start');

      if (paramStart && spots[paramStart]) {
        startSelect.value = paramStart;
        endSelect.value = "1g_7f_職員室";
      } else {
        startSelect.value = "1g_1f_事務室";
        endSelect.value = "1g_5f_1_10";
      }

      buildGraph();
      renderHintModal();

      setTimeout(() => {
        map.invalidateSize();
        map.fitBounds(bounds);
        showRoute();
      }, 100);
    }

    function renderHintModal() {
      const container = document.getElementById('hintContainer');
      container.innerHTML = "";
      hintLandmarks.forEach(item => {
        const card = document.createElement('div');
        card.className = 'hint-card';
        card.innerHTML = `
          <img src="${item.img}" alt="${item.title}">
          <div class="hint-card-title">${item.title}</div>
        `;
        card.onclick = () => {
          selectCurrentLocation(item.key);
          closeModal();
        };
        container.appendChild(card);
      });
    }

    function selectCurrentLocation(spotKey) {
      if (!spots[spotKey]) return;
      document.getElementById('startSelect').value = spotKey;
      showRoute();
    }

    function openModal() { document.getElementById('hintModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('hintModal').style.display = 'none'; }

    function clearRouteLayers() {
      routeLayers.forEach(l => map.removeLayer(l));
      routeLayers = [];
      if (animMarker) { map.removeLayer(animMarker); animMarker = null; }
      if (animTimer) { cancelAnimationFrame(animTimer); animTimer = null; }
    }

    function iconForVia(via) {
      if (via === "stairs") return L.divIcon({ className: '', html: '<div class="stair-icon" title="階段"></div>', iconSize: [22, 22], iconAnchor: [11, 11] });
      if (via === "escalator") return L.divIcon({ className: '', html: '<div class="escalator-icon" title="エスカレーター">ESC</div>', iconSize: [26, 26], iconAnchor: [13, 13] });
      return null;
    }

    function showRoute() {
      if (!map) return;

      const startKey = document.getElementById('startSelect').value;
      const endKey = document.getElementById('endSelect').value;
      const summaryEl = document.getElementById('routeSummary');

      if (startKey === endKey) {
        alert("出発地と目的地が同じ場所です。違う場所を選択してください。");
        return;
      }

      clearRouteLayers();

      const path = dijkstra(startKey, endKey);
      if (!path) {
        summaryEl.style.display = 'block';
        summaryEl.innerHTML = '<b>経路が見つかりませんでした。</b>階段/エスカレーターのノード設定を確認してください。';
        return;
      }

      const positions = path.map(step => graphNodes[step.node].pos);

      // 経路の線（複数区間）
      const line = L.polyline(positions, { color: '#2563eb', weight: 4, dashArray: '6, 6', opacity: 0.85 }).addTo(map);
      routeLayers.push(line);

      // 出発・目的地マーカー
      const startMarker = L.marker(spots[startKey].pos).addTo(map).bindPopup(`<b>[現在地] ${spots[startKey].name}</b>`).openPopup();
      const endMarker = L.marker(spots[endKey].pos).addTo(map).bindPopup(`<b>[目的地] ${spots[endKey].name}</b>`);
      routeLayers.push(startMarker, endMarker);

      // 階段・エスカレーターの通過点にアイコン表示
      let stairsCount = 0, escalatorCount = 0;
      path.forEach(step => {
        if (step.via === "stairs" || step.via === "escalator") {
          const icon = iconForVia(step.via);
          if (icon) {
            const m = L.marker(graphNodes[step.node].pos, { icon }).addTo(map);
            routeLayers.push(m);
          }
          if (step.via === "stairs") stairsCount++;
          if (step.via === "escalator") escalatorCount++;
        }
      });

      summaryEl.style.display = 'block';
      summaryEl.innerHTML = `<b>${spots[startKey].name}</b> → <b>${spots[endKey].name}</b>　`
        + (stairsCount ? `🪜階段${stairsCount}回　` : '')
        + (escalatorCount ? `⏫エスカレーター${escalatorCount}回` : '')
        + (!stairsCount && !escalatorCount ? '（同一フロア内）' : '');

      // アニメーション（区間をつないで移動）
      const pulseIcon = L.divIcon({ className: 'animated-pulse-icon', iconSize: [16, 16], iconAnchor: [8, 8] });
      animMarker = L.marker(positions[0], { icon: pulseIcon }).addTo(map);

      const segLengths = [];
      for (let i = 0; i < positions.length - 1; i++) segLengths.push(dist(positions[i], positions[i + 1]) || 1);
      const totalLen = segLengths.reduce((a, b) => a + b, 0) || 1;

      let progress = 0;
      const speed = totalLen / 4000; // 単位/msの目安
      let lastTs = null;

      function frame(ts) {
        if (lastTs == null) lastTs = ts;
        const dt = ts - lastTs; lastTs = ts;
        progress += speed * dt;
        if (progress > totalLen) progress = 0;

        let d = progress, segIdx = 0;
        while (segIdx < segLengths.length && d > segLengths[segIdx]) { d -= segLengths[segIdx]; segIdx++; }
        if (segIdx >= segLengths.length) segIdx = segLengths.length - 1;

        const a = positions[segIdx], b = positions[segIdx + 1] || positions[segIdx];
        const t = segLengths[segIdx] ? d / segLengths[segIdx] : 0;
        const curY = a[0] + (b[0] - a[0]) * t;
        const curX = a[1] + (b[1] - a[1]) * t;
        animMarker.setLatLng([curY, curX]);

        animTimer = requestAnimationFrame(frame);
      }
      animTimer = requestAnimationFrame(frame);

      map.invalidateSize();
      map.fitBounds(line.getBounds(), { padding: [100, 100] });
    }
  </script>
