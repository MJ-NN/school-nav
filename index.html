HTML
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名城大学附属高等学校 校内ナビ</title>
  <!-- Leaflet CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Google Fonts (Inter & Noto Sans JP) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --primary-color: #0f172a;
      --accent-color: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.3);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f8fafc;
      color: #334155;
      overflow: hidden;
    }

    /* 🔑 パスワード認証画面 */
    #pass-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: var(--bg-gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 40px 32px;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      text-align: center;
      width: 90%;
      max-width: 380px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card .logo-badge {
      display: inline-block;
      background: #eff6ff;
      color: var(--accent-color);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .login-card h2 {
      margin: 0 0 8px 0;
      color: var(--primary-color);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
    }

    .login-card p {
      font-size: 13px;
      color: #64748b;
      margin: 0 0 24px 0;
      line-height: 1.5;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 16px;
      text-align: center;
      outline: none;
      transition: all 0.2s;
    }

    .login-card input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      background: var(--accent-color);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: var(--shadow-md);
    }

    .login-card button:hover {
      background: var(--accent-hover);
    }

    .login-card button:active {
      transform: scale(0.98);
    }

    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 12px;
      font-weight: 500;
      display: none;
    }

    /* 🗺️ メイン画面 */
    #app-screen {
      display: none;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    #map {
      height: 100vh;
      width: 100vw;
      background: #f1f5f9;
      z-index: 1;
    }

    /* Floating UI パネル */
    .control-panel {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 92%;
      max-width: 680px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 16px 20px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .select-group {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .select-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .select-box label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .select-wrapper {
      position: relative;
    }

    select {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--primary-color);
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background-color: #ffffff;
      outline: none;
      cursor: pointer;
      appearance: none;
      transition: all 0.2s;
    }

    .select-wrapper::after {
      content: "▾";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #94a3b8;
      pointer-events: none;
    }

    select:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .btn-nav {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-nav:hover {
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
      transform: translateY(-1px);
    }

    .btn-nav:active {
      transform: translateY(0);
    }

    /* スマホ対応調整 */
    @media (max-width: 640px) {
      .control-panel {
        bottom: 16px;
        padding: 14px;
      }
      .select-group {
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

<!-- 🔑 パスワード画面 -->
<div id="pass-screen">
  <div class="login-card">
    <span class="logo-badge">MEIJO NAVI</span>
    <h2>名城大学附属高等学校<br>校内ナビゲーション</h2>
    <p>パスワードを入力して開始してください</p>
    <input type="password" id="passInput" placeholder="パスワード">
    <button onclick="checkPassword()">ログイン</button>
    <div id="errorMsg" class="error-msg">パスワードが正しくありません</div>
  </div>
</div>

<!-- 🗺️ ナビ画面 -->
<div id="app-screen">
  <div id="map"></div>
  <div class="control-panel">
    <div class="select-group">
      <div class="select-box">
        <label for="startSelect">出発地</label>
        <div class="select-wrapper">
          <select id="startSelect"></select>
        </div>
      </div>
      <div class="select-box">
        <label for="endSelect">目的地</label>
        <div class="select-wrapper">
          <select id="endSelect"></select>
        </div>
      </div>
    </div>
    <button class="btn-nav" onclick="showRoute()">
      <span>ルート案内を表示</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </button>
  </div>
</div>

<script>
  const CORRECT_PASSWORD = "meijo2026";

  let map = null;
  let activeLine = null;

  function checkPassword() {
    const input = document.getElementById('passInput').value;
    if (input === CORRECT_PASSWORD) {
      document.getElementById('pass-screen').style.opacity = '0';
      document.getElementById('pass-screen').style.transition = 'opacity 0.3s ease';
      setTimeout(() => {
        document.getElementById('pass-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        initMap();
      }, 300);
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  }

  document.getElementById('passInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  const spots = {
    // === 1号館 2F ===
    "2f_2a1":      { name: "1号館 2F 2A1教室",      pos: [-425, 228] },
    "2f_3a1":      { name: "1号館 2F 3A1教室",      pos: [-422, 272] },
    "2f_3a12":     { name: "1号館 2F 3A12教室",     pos: [-422, 312] },
    "2f_3a13":     { name: "1号館 2F 3A13教室",     pos: [-422, 342] },
    "2f_3a14":     { name: "1号館 2F 3A14教室",     pos: [-422, 372] },
    "2f_3a7":      { name: "1号館 2F 3A7教室",      pos: [-465, 228] },

    // === 1号館 3F ===
    "3f_3a2":      { name: "1号館 3F 3A2教室",      pos: [-290, 228] },
    "3f_3a3":      { name: "1号館 3F 3A3教室",      pos: [-330, 228] },
    "3f_3a4":      { name: "1号館 3F 3A4教室",      pos: [-370, 228] },
    "3f_3a5":      { name: "1号館 3F 3A5教室",      pos: [-410, 228] },
    "3f_3a6":      { name: "1号館 3F 3A6教室",      pos: [-450, 228] },
    "3f_2s4":      { name: "1号館 3F 2S4教室",      pos: [-290, 272] },

    // === 1号館 4F ===
    "4f_2a2":      { name: "1号館 4F 2A2教室",      pos: [-143, 229] },
    "4f_2a3":      { name: "1号館 4F 2A3教室",      pos: [-183, 229] },
    "4f_2a4":      { name: "1号館 4F 2A4教室",      pos: [-223, 229] },
    "4f_2a5":      { name: "1号館 4F 2A5教室",      pos: [-263, 229] },
    "4f_2a6":      { name: "1号館 4F 2A6教室",      pos: [-303, 229] },
    "4f_2a7":      { name: "1号馆 4F 2A7教室",      pos: [-143, 272] },
    "4f_2a8":      { name: "1号館 4F 2A8教室",      pos: [-263, 272] },
    "4f_2a9":      { name: "1号館 4F 2A9教室",      pos: [-303, 272] },

    // === 1号館 6F ===
    "6f_1_1":      { name: "1号館 6F 1-1教室",      pos: [-425, 142] },
    "6f_1_2":      { name: "1号館 6F 1-2教室",      pos: [-465, 142] },
    "6f_1_8":      { name: "1号館 6F 1-8教室",      pos: [-465, 185] },

    // === 1号館 7F ===
    "7f_staff":    { name: "1号館 7F 職員室",       pos: [-330, 160] },

    // === 1号館 8F ===
    "8f_ict2":     { name: "1号館 8F ICTルーム2",   pos: [-143, 110] },

    // === 2号館 4F ===
    "2g_4f_store":  { name: "2号館 4F 購買",        pos: [-210, 500] },

    // === 3号館 ===
    "3g_2f_avl":    { name: "3号館 2F 視聴覚室(AVL)",pos: [-143, 675] },

    // === 4号館 ===
    "4g_1f_library":{ name: "4号館 1F 図書館",      pos: [-600, 480] }
  };

  function initMap() {
    if (map) return;

    const bounds = [[-700, 0], [0, 1000]];

    map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -1.5,
      maxZoom: 2,
      maxBounds: bounds,
      zoomControl: false // ズームボタンを非表示にしてスッキリ化
    });

    L.imageOverlay('R8教室配置図-1.png', bounds).addTo(map);
    map.fitBounds(bounds);

    const startSelect = document.getElementById('startSelect');
    const endSelect = document.getElementById('endSelect');

    Object.keys(spots).forEach(key => {
      const spot = spots[key];

      const optStart = document.createElement('option');
      optStart.value = key; optStart.textContent = spot.name;
      startSelect.appendChild(optStart);

      const optEnd = document.createElement('option');
      optEnd.value = key; optEnd.textContent = spot.name;
      endSelect.appendChild(optEnd);

      L.marker(spot.pos).addTo(map).bindPopup(`<b>${spot.name}</b>`);
    });

    startSelect.value = "4f_2a2";
    endSelect.value = "2f_3a1";
  }

  function showRoute() {
    const startKey = document.getElementById('startSelect').value;
    const endKey = document.getElementById('endSelect').value;

    if (startKey === endKey) {
      alert("出発地と目的地が異なる場所を選択してください");
      return;
    }

    if (activeLine) map.removeLayer(activeLine);

    const startPos = spots[startKey].pos;
    const endPos = spots[endKey].pos;

    activeLine = L.polyline([startPos, endPos], {
      color: '#2563eb',
      weight: 5,
      dashArray: '10, 10',
      opacity: 0.9
    }).addTo(map);

    map.fitBounds(activeLine.getBounds(), { padding: [80, 80] });
  }
</script>

</body>
</html>
