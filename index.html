<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名城大学附属高等学校 校内ナビ（全教室調整モード）</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --primary-color: #0f172a;
      --accent-color: #2563eb;
      --glass-bg: rgba(255, 255, 255, 0.92);
      --glass-border: rgba(255, 255, 255, 0.4);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
    body { margin: 0; padding: 0; background: #f8fafc; color: #334155; overflow: hidden; }

    #pass-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.95); padding: 32px 24px; border-radius: 20px;
      text-align: center; width: 90%; max-width: 360px; box-shadow: var(--shadow-lg);
    }
    .login-card h2 { margin: 0 0 8px; color: var(--primary-color); font-size: 18px; }
    .login-card input {
      width: 100%; padding: 12px; font-size: 15px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; margin-bottom: 12px; text-align: center; outline: none;
    }
    .login-card button {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
      color: white; background: var(--accent-color); border: none; border-radius: 10px; cursor: pointer;
    }

    #app-screen { display: none; height: 100vh; width: 100vw; position: relative; }
    #map { height: 100vh; width: 100vw; background: #f1f5f9; cursor: crosshair; }

    .control-panel {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 1000; width: 92%; max-width: 750px;
      background: var(--glass-bg); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px;
      padding: 14px 18px; box-shadow: var(--shadow-lg);
      display: flex; flex-direction: column; gap: 10px;
    }
    .target-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: #eff6ff; padding: 8px 12px; border-radius: 10px; border: 1px solid #bfdbfe;
    }
    .target-bar label { font-size: 12px; font-weight: 700; color: #1e40af; white-space: nowrap; }
    select {
      flex: 1; padding: 8px; font-size: 13px; font-weight: 600;
      border: 1px solid #cbd5e1; border-radius: 8px; background: white; outline: none;
    }
    .btn-copy {
      width: 100%; padding: 12px; font-size: 14px; font-weight: 700;
      color: white; background: #16a34a; border: none; border-radius: 10px;
      cursor: pointer; box-shadow: 0 4px 10px rgba(22, 163, 74, 0.3);
    }
    .btn-copy:hover { background: #15803d; }
  </style>
</head>
<body>

<div id="pass-screen">
  <div class="login-card">
    <h2>校内ナビ（全77箇所 調整）</h2>
    <input type="password" id="passInput" placeholder="パスワードを入力">
    <button onclick="checkPassword()">ログイン</button>
  </div>
</div>

<div id="app-screen">
  <div id="map"></div>
  <div class="control-panel">
    <div class="target-bar">
      <label for="targetSelect">🎯 対象を選択:</label>
      <select id="targetSelect" onchange="updateTarget()"></select>
    </div>
    <div style="font-size: 11px; color: #64748b; text-align: center;">
      ※プルダウンで場所を選び、マップ上のその場所をクリックするとピンが移動します。
    </div>
    <button class="btn-copy" onclick="outputCoords()">📋 全座標データをコピーして送信</button>
  </div>
</div>

    "4g_3f_cad2": { name: "4号館 3F CAD室2", pos: [-480, 840] },
    "4g_4f_パソコン3": { name: "4号館 4F パソコン教室3", pos: [-420, 920] },
    "4g_4f_パソコン4": { name: "4号館 4F パソコン教室4", pos: [-480, 920] },
    "4g_4f_商業管理室": { name: "4号館 4F 商業管理室", pos: [-540, 920] }
  };

  const markers = {};

  function checkPassword() {
    if (document.getElementById('passInput').value === CORRECT_PASSWORD) {
      document.getElementById('pass-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      initMap();
    }
  }

  function initMap() {
    if (map) return;
    const bounds = [[-700, 0], [0, 1000]];

    map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -1.5,
      maxZoom: 2,
      maxBounds: bounds,
      zoomControl: false
    });

    L.imageOverlay('R8教室配置図-1.png', bounds).addTo(map);
    map.fitBounds(bounds);

    const targetSelect = document.getElementById('targetSelect');

    Object.keys(spots).forEach(key => {
      const spot = spots[key];
      targetSelect.appendChild(new Option(spot.name, key));

      const marker = L.marker(spot.pos, { interactive: false }).addTo(map);
      marker.bindTooltip(spot.name, { permanent: true, direction: 'top' });
      markers[key] = marker;
    });

    map.on('click', function(e) {
      const lat = Math.round(e.latlng.lat);
      const lng = Math.round(e.latlng.lng);
      
      spots[currentTargetKey].pos = [lat, lng];
      markers[currentTargetKey].setLatLng([lat, lng]);
    });
  }

  function updateTarget() {
    currentTargetKey = document.getElementById('targetSelect').value;
  }

  function outputCoords() {
    const jsonStr = JSON.stringify(spots, null, 2);
    navigator.clipboard.writeText(jsonStr).then(() => {
      alert("全箇所の座標データをコピーしました！");
    }).catch(() => {
      alert("コピーに失敗しました。");
    });
  }
</script>

</body>
