<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名城大学附属高等学校 校内ナビ</title>
  <!-- Leaflet CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --primary-color: #0f172a;
      --accent-color: #2563eb;
      --accent-hover: #1d4ed8;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --glass-bg: rgba(255, 255, 255, 0.92);
      --glass-border: rgba(255, 255, 255, 0.4);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
    body { margin: 0; padding: 0; background: #f8fafc; color: #334155; overflow: hidden; }

    /* 🔑 パスワード画面 */
    #pass-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); padding: 40px 32px; border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); text-align: center;
      width: 90%; max-width: 380px; animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .login-card .logo-badge {
      display: inline-block; background: #eff6ff; color: var(--accent-color);
      font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 0.05em;
    }
    .login-card h2 { margin: 0 0 8px 0; color: var(--primary-color); font-size: 20px; font-weight: 700; line-height: 1.4; }
    .login-card p { font-size: 13px; color: #64748b; margin: 0 0 24px 0; line-height: 1.5; }
    .login-card input {
      width: 100%; padding: 12px 16px; font-size: 15px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; margin-bottom: 16px; text-align: center; outline: none; transition: all 0.2s;
    }
    .login-card input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
    .login-card button {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 600; color: white;
      background: var(--accent-color); border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.2s, transform 0.1s; box-shadow: var(--shadow-md);
    }
    .login-card button:hover { background: var(--accent-hover); }
    .error-msg { color: #ef4444; font-size: 12px; margin-top: 12px; font-weight: 500; display: none; }

    /* 🗺️ メイン画面 */
    #app-screen { display: none; height: 100vh; width: 100vw; position: relative; }
    #map { height: 100vh; width: 100vw; background: #f1f5f9; z-index: 1; }

    /* Control Panel */
    .control-panel {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 1000; width: 92%; max-width: 680px;
      background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 20px; padding: 16px 20px;
      box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 10px;
    }
    .select-group { display: flex; gap: 12px; width: 100%; }
    .select-box { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .select-box label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .select-wrapper { position: relative; }
    select {
      width: 100%; padding: 10px 14px; font-size: 14px; font-weight: 500;
      color: var(--primary-color); border: 1px solid #cbd5e1; border-radius: 10px;
      background-color: #ffffff; outline: none; cursor: pointer; appearance: none; transition: all 0.2s;
    }
    .select-wrapper::after {
      content: "▾"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 12px; color: #94a3b8; pointer-events: none;
    }
    select:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }

    .btn-help {
      background: none; border: none; color: #2563eb; font-size: 12px; font-weight: 600;
      cursor: pointer; text-decoration: underline; padding: 2px 0; align-self: flex-start;
      display: flex; align-items: center; gap: 4px;
    }

    .btn-nav {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 700; color: white;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-nav:hover { box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4); transform: translateY(-1px); }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
      z-index: 9000; display: none; justify-content: center; align-items: center;
    }
    .modal-card {
      background: white; border-radius: 20px; padding: 24px; width: 90%; max-width: 520px;
      max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: fadeIn 0.2s ease-out;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header h3 { margin: 0; font-size: 18px; color: var(--primary-color); }
    .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; }
    
    .hint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .hint-card {
      border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: all 0.2s; text-align: center; background: #f8fafc;
    }
    .hint-card:hover { border-color: var(--accent-color); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .hint-card img { width: 100%; height: 100px; object-fit: cover; background: #e2e8f0; }
    .hint-card-title { font-size: 12px; font-weight: 700; padding: 8px 6px; color: #334155; }

    /* Pulse Icon */
    .animated-pulse-icon {
      background: #2563eb; border: 3px solid #ffffff; border-radius: 50%;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.8);
    }

    @media (max-width: 640px) {
      .control-panel { bottom: 12px; padding: 14px; }
      .select-group { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

<!-- 🔑 パスワード画面 -->
<div id="pass-screen">
  <div class="login-card">
    <span class="logo-badge">MEIJO NAVI</span>
    <h2>名城大学附属高等学校<br>校内ナビゲーション</h2>
    <p>パスワードを入力して開始してください</p>
    <input type="password" id="passInput" placeholder="パスワード">
    <button onclick="checkPassword()">ログイン</button>
    <div id="errorMsg" class="error-msg">パスワードが正しくありません</div>
  </div>
</div>

<!-- 🗺️ ナビ画面 -->
<div id="app-screen">
  <div id="map"></div>
  <div class="control-panel">
    <div class="select-group">
      <div class="select-box">
        <label for="startSelect">出発地</label>
        <div class="select-wrapper">
          <select id="startSelect"></select>
        </div>
      </div>
      <div class="select-box">
        <label for="endSelect">目的地</label>
        <div class="select-wrapper">
          <select id="endSelect"></select>
        </div>
      </div>
    </div>

    <button class="btn-help" onclick="openModal()">
      <span>📍 現在地がわからないとき（目印から探す）</span>
    </button>

    <button class="btn-nav" onclick="showRoute()">
      <span>ルート案内を開始</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </button>
  </div>
</div>

<!-- 🖼️ 目印選択モーダル -->
<div id="hintModal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <h3>近くにある目印を選んでください</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="hint-grid" id="hintContainer"></div>
  </div>
</div>

<script>
  const CORRECT_PASSWORD = "meijo2026";
  let map = null, activeLine = null, animMarker = null, animTimer = null;
  let startMarker = null, endMarker = null;

  function checkPassword() {
    const input = document.getElementById('passInput').value;
    if (input === CORRECT_PASSWORD) {
      document.getElementById('pass-screen').style.opacity = '0';
      document.getElementById('pass-screen').style.transition = 'opacity 0.3s ease';
      setTimeout(() => {
        document.getElementById('pass-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        initMap();
      }, 300);
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  }

  document.getElementById('passInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  // 📍 1. スポット（目的地・出発地）一覧
  const spots = {
    "1g_1f_事務室": { name: "1号館 1F 事務室", node: "n_1g_1f_office" },
    "1g_2f_3a1":  { name: "1号館 2F 3A1",  node: "n_1g_2f_3a1" },
    "1g_3f_2s1":  { name: "1号館 3F 2S1",  node: "n_1g_3f_2s1" },
    "1g_4f_2a2":  { name: "1号館 4F 2A2",  node: "n_1g_4f_2a2" },
    "2g_1f_図書館": { name: "2号館 1F 図書館", node: "n_2g_1f_library" },
    "2g_4f_購買":   { name: "2号館 4F 購買",   node: "n_2g_4f_shop" }
  };

  // 🗺️ 2. ノード（実際の画像上の位置座標）
  // 校長室を突き抜けず、右側の「階段マーク」を通るように正しく設定しています
  const nodes = {
    // 【1階】
    "n_1g_1f_office":   { pos: [-580, 500] }, // 事務室のピンの位置
    "n_1g_1f_corridor": { pos: [-580, 520] }, // 1F 廊下
    "n_1g_1f_stairs":   { pos: [-580, 580] }, // 1F 階段（マークの位置）
    "n_2g_1f_library":  { pos: [-627, 520] },

    // 【2階】
    "n_1g_2f_3a1":      { pos: [-200, 500] }, // 2F 3A1
    "n_1g_2f_corridor": { pos: [-200, 520] }, // 2F 廊下
    "n_1g_2f_stairs":   { pos: [-200, 580] }, // 2F 階段（マークの位置）

    // 【3階】
    "n_1g_3f_2s1":      { pos: [ -30, 500] }, // 3F 2S1のピンの位置
    "n_1g_3f_corridor": { pos: [ -30, 520] }, // 3F 廊下
    "n_1g_3f_stairs":   { pos: [ -30, 580] }, // 3F 階段（マークの位置）

    // 【4階】
    "n_1g_4f_2a2":      { pos: [-181, 228] },
    "n_1g_4f_stairs":   { pos: [-181, 580] }, // 4F 階段
    "n_2g_4f_shop":     { pos: [-191, 499] }
  };

  // 🚶 3. ネットワーク接続
  // 階の移動（1F↔2F, 2F↔3Fなど）は「stairs（階段）」同士のみを線で結びます
  const graph = {
    // --- 1階 ---
    "n_1g_1f_office":   { "n_1g_1f_corridor": 5 },
    "n_1g_1f_corridor": { "n_1g_1f_office": 5, "n_1g_1f_stairs": 10, "n_2g_1f_library": 30 },
    "n_2g_1f_library":  { "n_1g_1f_corridor": 30 },
    // 階段から上階の階段へ
    "n_1g_1f_stairs":   { "n_1g_1f_corridor": 10, "n_1g_2f_stairs": 20 },

    // --- 2階 ---
    "n_1g_2f_3a1":      { "n_1g_2f_corridor": 5 },
    "n_1g_2f_corridor": { "n_1g_2f_3a1": 5, "n_1g_2f_stairs": 10 },
    "n_2g_2f_stairs":   { "n_1g_2f_corridor": 10, "n_1g_1f_stairs": 20, "n_1g_3f_stairs": 20 },

    // --- 3階 ---
    "n_1g_3f_2s1":      { "n_1g_3f_corridor": 5 },
    "n_1g_3f_corridor": { "n_1g_3f_2s1": 5, "n_1g_3f_stairs": 10 },
    "n_1g_3f_stairs":   { "n_1g_3f_corridor": 10, "n_1g_2f_stairs": 20, "n_1g_4f_stairs": 20 },

    // --- 4階 ---
    "n_1g_4f_2a2":      { "n_1g_4f_stairs": 20 },
    "n_1g_4f_stairs":   { "n_1g_4f_2a2": 20, "n_1g_3f_stairs": 20, "n_2g_4f_shop": 25 },
    "n_2g_4f_shop":     { "n_1g_4f_stairs": 25 }
  };

  // 📷 写真ヒントデータ
  const hintLandmarks = [
    { key: "1g_1f_事務室", title: "1号館1F 事務室前", img: "https://via.placeholder.com/150/2563eb/ffffff?text=1F+事務室" },
    { key: "2g_1f_図書館", title: "2号館1F 図書館前", img: "https://via.placeholder.com/150/2563eb/ffffff?text=2F+図書館" },
    { key: "2g_4f_購買",   title: "2号館4F 購買前",   img: "https://via.placeholder.com/150/2563eb/ffffff?text=4F+購買" }
  ];

  function initMap() {
    if (map) return;
    const bounds = [[-700, 0], [0, 1000]];
    map = L.map('map', { crs: L.CRS.Simple, minZoom: -1.5, maxZoom: 2, maxBounds: bounds, zoomControl: false });
    L.imageOverlay('R8教室配置図-1.png', bounds).addTo(map);
    map.fitBounds(bounds);

    const startSelect = document.getElementById('startSelect');
    const endSelect = document.getElementById('endSelect');

    Object.keys(spots).forEach(key => {
      const spot = spots[key];
      const optStart = document.createElement('option'); optStart.value = key; optStart.textContent = spot.name;
      startSelect.appendChild(optStart);
      const optEnd = document.createElement('option'); optEnd.value = key; optEnd.textContent = spot.name;
      endSelect.appendChild(optEnd);
    });

    const urlParams = new URLSearchParams(window.location.search);
    const paramStart = urlParams.get('start');
    if (paramStart && spots[paramStart]) {
      startSelect.value = paramStart;
      endSelect.value = "1g_3f_2s1";
    } else {
      startSelect.value = "1g_1f_事務室";
      endSelect.value = "1g_3f_2s1";
    }

    renderHintModal();
    showRoute();
  }

  // 🧠 最短経路計算（ダイクストラ法）
  function dijkstra(startNode, targetNode) {
    let distances = {}, parents = {}, pq = [];
    Object.keys(nodes).forEach(node => {
      distances[node] = Infinity;
      parents[node] = null;
    });
    distances[startNode] = 0;
    pq.push({ node: startNode, dist: 0 });

    while (pq.length > 0) {
      pq.sort((a, b) => a.dist - b.dist);
      let { node: current } = pq.shift();

      if (current === targetNode) break;

      let neighbors = graph[current] || {};
      for (let neighbor in neighbors) {
        let alt = distances[current] + neighbors[neighbor];
        if (alt < distances[neighbor]) {
          distances[neighbor] = alt;
          parents[neighbor] = current;
          pq.push({ node: neighbor, dist: alt });
        }
      }
    }

    let path = [];
    let curr = targetNode;
    while (curr) {
      if (nodes[curr]) path.unshift(nodes[curr].pos);
      curr = parents[curr];
    }
    return path;
  }

  function showRoute() {
    const startKey = document.getElementById('startSelect').value;
    const endKey = document.getElementById('endSelect').value;

    if (startKey === endKey) {
      alert("出発地と目的地が異なる場所を選択してください");
      return;
    }

    if (activeLine) map.removeLayer(activeLine);
    if (startMarker) map.removeLayer(startMarker);
    if (endMarker) map.removeLayer(endMarker);
    if (animMarker) map.removeLayer(animMarker);
    if (animTimer) clearInterval(animTimer);

    const startSpot = spots[startKey];
    const endSpot = spots[endKey];

    // 最短経路を計算
    const routePath = dijkstra(startSpot.node, endSpot.node);

    if (routePath.length < 2) {
      alert("ルートが見つかりませんでした");
      return;
    }

    startMarker = L.marker(routePath[0]).addTo(map).bindPopup(`<b>[出発地] ${startSpot.name}</b>`).openPopup();
    endMarker = L.marker(routePath[routePath.length - 1]).addTo(map).bindPopup(`<b>[目的地] ${endSpot.name}</b>`);

    // 青いルート線を描画
    activeLine = L.polyline(routePath, { color: '#2563eb', weight: 5, opacity: 0.85 }).addTo(map);

    // アニメーション用マーカー
    const pulseIcon = L.divIcon({ className: 'animated-pulse-icon', iconSize: [16, 16], iconAnchor: [8, 8] });
    animMarker = L.marker(routePath[0], { icon: pulseIcon }).addTo(map);

    let currentSegment = 0;
    let progress = 0;

    animTimer = setInterval(() => {
      progress += 0.04;
      if (progress >= 1) {
        progress = 0;
        currentSegment++;
        if (currentSegment >= routePath.length - 1) {
          currentSegment = 0;
        }
      }
      const p1 = routePath[currentSegment];
      const p2 = routePath[currentSegment + 1];
      const currentY = p1[0] + (p2[0] - p1[0]) * progress;
      const currentX = p1[1] + (p2[1] - p1[1]) * progress;
      animMarker.setLatLng([currentY, currentX]);
    }, 30);

    map.fitBounds(activeLine.getBounds(), { padding: [80, 80] });
  }

  function renderHintModal() {
    const container = document.getElementById('hintContainer');
    container.innerHTML = "";
    hintLandmarks.forEach(item => {
      const card = document.createElement('div');
      card.className = 'hint-card';
      card.innerHTML = `<img src="${item.img}" alt="${item.title}"><div class="hint-card-title">${item.title}</div>`;
      card.onclick = () => {
        document.getElementById('startSelect').value = item.key;
        closeModal();
        showRoute();
      };
      container.appendChild(card);
    });
  }

  function openModal() { document.getElementById('hintModal').style.display = 'flex'; }
  function closeModal() { document.getElementById('hintModal').style.display = 'none'; }
</script>

</body>
</html>
