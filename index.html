<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校内ナビゲーション</title>
  <!-- LeafletのCSS/JS読み込み -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    #map { height: 100vh; width: 100vw; }
    .nav-bar {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      background: white; padding: 10px; border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-family: sans-serif;
    }
  </style>
</head>
<body>

<div class="nav-bar">
  <h3>校内マップ（テスト）</h3>
  <p>ピンをタップすると場所名が表示されます</p>
</div>

<div id="map"></div>

<script>
  // 地図の初期化（緯度・経度とズームレベル）
  const map = L.map('map').setView([35.6812, 139.7671], 18);

  // 無料の背景地図タイル（OpenStreetMap）
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // テスト用スポット（ピン）の配置
  L.marker([35.6812, 139.7671]).addTo(map)
    .bindPopup('<b>本部棟 / 総合受付</b>').openPopup();

  L.marker([35.6818, 139.7675]).addTo(map)
    .bindPopup('<b>学食 / カフェテリア</b>');
</script>

</body>
</html>
